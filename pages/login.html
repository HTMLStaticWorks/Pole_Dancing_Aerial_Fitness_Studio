<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to Pole Dancing Studio — Access your classes, bookings and membership." />
  <title>Login — Pole Dancing Studio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩰</text></svg>">
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link id="rtl-stylesheet" rel="stylesheet" href="../assets/css/rtl.css" disabled />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .social-signin { display:flex; gap:.75rem; justify-content:center; }
    .social-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.75rem; border:2px solid var(--border); border-radius:var(--radius-md); font-weight:600; font-size:.88rem; color:var(--text-primary); background:var(--bg-card); transition:var(--transition-bounce); }
    .social-btn:hover { border-color:var(--primary); color:var(--primary); transform:translateY(-3px); box-shadow:var(--shadow-md); }
  </style>
</head>
<body>

<!-- Minimal header for auth pages -->


<div class="auth-container">
  <!-- Right Side - Form -->
  <div class="auth-form-side">
    <!-- Auth Page Toggles (RTL & Theme) -->
    <div class="auth-controls">
      <button class="nav-icon-btn" onclick="window.PD.RTLManager.toggle()" title="Toggle RTL" aria-label="Toggle RTL" style="font-size: 0.78rem; font-weight: 800;">RTL</button>
      <button class="nav-icon-btn" onclick="window.PD.ThemeManager.toggle()" title="Toggle Theme" aria-label="Toggle theme">
        <i class="theme-toggle-icon fas fa-moon"></i>
      </button>
    </div>

    <div class="auth-form-container">
      <a href="../index.html" class="auth-logo">
        <div class="brand-logo">🩰</div>
        <span class="brand-name">Pole <span>Dancing</span></span>
      </a>

      <h1 class="auth-title">Sign In</h1>
      <p class="auth-subtitle">Login and have a healthy dance <a href="register.html"></a></p>

      <!-- Social login -->
     

      <!-- Login form -->
      <form data-validate-form>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" data-validate="required,email" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-toggle">
            <input type="password" id="password" class="form-control" placeholder="Enter your password" data-validate="required,minLength:6" autocomplete="current-password" />
            <button type="button" class="toggle-btn fas fa-eye" aria-label="Toggle password visibility"></button>
          </div>
        </div>
        <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; margin-bottom: 1.5rem;">
          <div class="checkbox-group">
            <input type="checkbox" id="remember" />
            <label for="remember" style="font-size: .88rem; color: var(--text-secondary); cursor: pointer;">Remember me</label>
          </div>
          <a href="#" style="font-size: .85rem; color: var(--primary); font-weight: 600; text-decoration: none;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-bottom:1.5rem;">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
              <div class="auth-divider">or continue with</div>

               <div class="social-signin">
        <button class="social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn"><i class="fab fa-apple"></i>Apple</button>
      </div>

      </form>

      <div class="auth-footer">
        New to aerial fitness? <a href="register.html">Create a free account</a>
      </div>
      
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
</body>
</html>
