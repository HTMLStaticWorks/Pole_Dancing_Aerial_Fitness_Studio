<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Pole Dancing Studio</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link id="rtl-stylesheet" rel="stylesheet" href="../assets/css/rtl.css" disabled />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .error-bg { position:absolute;inset:0;overflow:hidden; }
    .error-bg-img { width:100%;height:100%;object-fit:cover;opacity:.1; }
    .error-content { position:relative;z-index:1;text-align:center;padding:2rem; }
    .error-links { display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2.5rem; }
    .floating-pole {
      position:absolute;
      font-size:4rem;
      opacity:.15;
      animation:floatSpin var(--dur,8s) ease-in-out infinite var(--delay,0s);
    }
    @keyframes floatSpin {
      0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-20px) rotate(10deg);}
    }
  </style>
</head>
<body>
<div class="error-page" style="position:relative;overflow:hidden;">
  <div class="error-bg">
    <img src="https://images.unsplash.com/photo-1518611012118-696072aa579a?w=1400&q=60" alt="" aria-hidden="true" class="error-bg-img" loading="lazy" />
  </div>

  <!-- Floating decorative elements -->
  <span class="floating-pole" style="top:10%;left:5%;--dur:10s;--delay:-2s;">🩰</span>
  <span class="floating-pole" style="top:20%;right:8%;--dur:12s;--delay:-4s;">✨</span>
  <span class="floating-pole" style="bottom:15%;left:10%;--dur:9s;--delay:-1s;">💫</span>
  <span class="floating-pole" style="bottom:25%;right:5%;--dur:11s;--delay:-6s;">🎀</span>

  <div class="error-content">
    <div class="error-number" data-text="404">404</div>
    <h2 class="error-title" style="color:#fff;font-size:2rem;">Oops! You've Taken a Wrong Turn</h2>
    <p class="error-desc" style="max-width:500px;margin:0 auto;">Looks like this page decided to spin off into the ether. Even the best aerial artists miss their mark sometimes — let's get you back on the pole!</p>
    <div class="error-links">
      <a href="index.html" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Back to Home</a>
      <a href="services.html" class="btn btn-ghost btn-lg"><i class="fas fa-compass"></i> Explore Classes</a>
      <a href="contact.html" class="btn btn-ghost btn-lg"><i class="fas fa-envelope"></i> Contact Us</a>
    </div>

    <!-- Quick links -->
    <div style="margin-top:3rem;display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;">
      <a href="about.html" class="btn btn-ghost btn-sm">About Us</a>
      <a href="services.html" class="btn btn-ghost btn-sm">Services</a>
      <a href="blog.html" class="btn btn-ghost btn-sm">Blog</a>
      <a href="register.html" class="btn btn-ghost btn-sm">Free Trial</a>
    </div>
  </div>
</div>
<script src="../assets/js/main.js"></script>
</body>
</html>
