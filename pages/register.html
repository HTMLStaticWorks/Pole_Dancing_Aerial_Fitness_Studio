<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Register at Pole Dancing Studio — Sign up for your free trial class and membership." />
  <title>Create Account — Pole Dancing Studio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩰</text></svg>">
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link id="rtl-stylesheet" rel="stylesheet" href="../assets/css/rtl.css" disabled />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .social-signin { display:flex;gap:.75rem;justify-content:center; }
    .social-btn { flex:1;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem;border:2px solid var(--border);border-radius:var(--radius-md);font-weight:600;font-size:.88rem;color:var(--text-primary);background:var(--bg-card);transition:var(--transition-bounce); }
    .social-btn:hover { border-color:var(--primary);color:var(--primary);transform:translateY(-3px);box-shadow:var(--shadow-md); }
    .progress-steps { display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:2rem; }
    .progress-step { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;transition:var(--transition); }
    .progress-step.active { background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(201,24,74,.3); }
    .progress-step.done { background:rgba(201,24,74,.15);color:var(--primary); }
    .progress-step.inactive { background:var(--bg-secondary);color:var(--text-light);border:2px solid var(--border); }
    .progress-line { flex:1;max-width:60px;height:2px;background:var(--border); }
    .progress-line.done { background:var(--primary); }
    .trial-banner { background:linear-gradient(135deg,rgba(201,24,74,.1),rgba(233,196,106,.1));border:1px solid rgba(201,24,74,.2);border-radius:var(--radius-md);padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem;margin-bottom:2rem; }
    .trial-banner i { color:var(--primary);font-size:1.2rem;flex-shrink:0; }
    .trial-banner p { font-size:.88rem;color:var(--text-secondary);margin:0; }
    .trial-banner strong { color:var(--primary); }
    .strength-bar { height:4px;border-radius:2px;background:var(--border);margin-top:.5rem;overflow:hidden; }
    .strength-fill { height:100%;border-radius:2px;transition:var(--transition);width:0; }
    .strength-label { font-size:.75rem;margin-top:.3rem; }
  </style>
</head>
<body>



<div class="auth-container">
  <!-- Right - Form -->
  <div class="auth-form-side">
    <!-- Auth Page Toggles (RTL & Theme) -->
    <div class="auth-controls">
      <button class="nav-icon-btn" onclick="window.PD.RTLManager.toggle()" title="Toggle RTL" aria-label="Toggle RTL" style="font-size: 0.78rem; font-weight: 800;">RTL</button>
      <button class="nav-icon-btn" onclick="window.PD.ThemeManager.toggle()" title="Toggle Theme" aria-label="Toggle theme">
        <i class="theme-toggle-icon fas fa-moon"></i>
      </button>
    </div>

    <div class="auth-form-container">
      <a href="../index.html" class="auth-logo">
        <div class="brand-logo">🩰</div>
        <span class="brand-name">Pole <span>Dancing</span></span>
      </a>

      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Create your accout and dance with Us <a href="login.html"></a></p>

      <!-- Free trial banner -->
      

      <!-- Social signup -->
      

      <!-- Registration form -->
      <form data-validate-form>
        <div class="form-group">
            <label class="form-label" for="reg-fname">First Name *</label>
            <input type="text" id="reg-fname" class="form-control" placeholder="" data-validate="required" autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-lname">Last Name *</label>
            <input type="text" id="reg-lname" class="form-control" placeholder="" data-validate="required" autocomplete="family-name" />
          </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address *</label>
          <input type="email" id="reg-email" class="form-control" placeholder="" data-validate="required,email" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-phone">Phone Number *</label>
          <input type="tel" id="reg-phone" class="form-control" placeholder="" data-validate="required,phone" autocomplete="tel" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-interest">I'm interested in *</label>
          <select id="reg-interest" class="form-control" data-validate="required">
            <option value="">Select your main interest...</option>
            <option>Pole Fitness — Beginner</option>
            <option>Aerial Silks — Beginner</option>
            <option>Lyra / Aerial Hoop — Beginner</option>
            <option>Flexibility & Conditioning</option>
            <option>Party Package</option>
            <option>I want to explore all options</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password *</label>
          <div class="password-toggle">
            <input type="password" id="reg-password" class="form-control" placeholder="Create a strong password" data-validate="required,minLength:8" autocomplete="new-password" oninput="checkStrength(this.value)" />
            <button type="button" class="toggle-btn fas fa-eye" aria-label="Toggle password visibility"></button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password *</label>
          <div class="password-toggle">
            <input type="password" id="reg-confirm" class="form-control" placeholder="Repeat your password" data-validate="required,minLength:8" autocomplete="new-password" />
            <button type="button" class="toggle-btn fas fa-eye" aria-label="Toggle password visibility"></button>
          </div>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="terms" required />
            <label for="terms" style="font-size:.85rem;color:var(--text-secondary);">I agree to the <a href="#" style="color:var(--primary)">Terms of Service</a> and <a href="#" style="color:var(--primary)">Privacy Policy</a> *</label>
          </div>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="offers" />
            <label for="offers" style="font-size:.85rem;color:var(--text-secondary);">Send me class updates, tips, and exclusive offers</label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-bottom:1.5rem;">
          <i class="fas fa-user-plus"></i> Create Account
        </button>

              <div class="auth-divider">or sign up with email</div>
<div class="social-signin">
        <button class="social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn"><i class="fab fa-apple"></i>Apple</button>
      </div>
      </form>

      <div class="auth-footer">
        Already a member? <a href="login.html">Sign in here</a>
      </div>
      <div style="text-align:center;margin-top:1rem;">
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>
  function checkStrength(val) {
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { width: '0%', color: '#ef4444', text: 'Too short' },
      { width: '25%', color: '#ef4444', text: 'Weak' },
      { width: '50%', color: '#f59e0b', text: 'Fair' },
      { width: '75%', color: '#10b981', text: 'Good' },
      { width: '100%', color: '#10b981', text: 'Strong ✓' },
    ];
    const l = levels[val.length === 0 ? 0 : score];
    fill.style.width = l.width;
    fill.style.background = l.color;
    label.textContent = l.text;
    label.style.color = l.color;
  }
</script>
</body>
</html>
